const typeConfig = {
  carousel: { label: "Carousel", icon: "ti-layout-grid", cls: "type-carousel" },
  single: { label: "Single / GIF", icon: "ti-photo", cls: "type-single" },
  reel: { label: "Reel", icon: "ti-player-play", cls: "type-reel" }
};

let activeId = null;

function render() {
  const container = document.getElementById('weeks-container');
  container.innerHTML = '';

  weeks.forEach((week, wi) => {
    const weekEl = document.createElement('div');
    weekEl.className = 'week';
    weekEl.innerHTML = `
      <div class="week-header">
        <span class="week-label">${week.label} · ${week.dates}</span>
        <span class="week-theme">${week.theme}</span>
      </div>
      <div class="posts" id="posts-${wi}"></div>
      <div class="detail-panel" id="detail-${wi}"></div>
    `;
    container.appendChild(weekEl);

    const postsEl = weekEl.querySelector(`#posts-${wi}`);
    week.posts.forEach((post, pi) => {
      const id = `${wi}-${pi}`;
      const tc = typeConfig[post.type];
      const postEl = document.createElement('div');
      postEl.className = 'post' + (activeId === id ? ' active' : '');
      postEl.id = `post-${id}`;
      postEl.innerHTML = `
        <div class="post-day">${post.day}</div>
        <div class="post-date">${post.date}</div>
        <span class="type-badge ${tc.cls}"><i class="ti ${tc.icon}" aria-hidden="true" style="font-size:11px"></i>${tc.label}</span>
        <div class="post-pillar">${post.pillar}</div>
        <div class="post-title">${post.title}</div>
      `;
      postEl.addEventListener('click', () => toggleDetail(wi, pi, post));
      postsEl.appendChild(postEl);
    });
  });
}

function toggleDetail(wi, pi, post) {
  const id = `${wi}-${pi}`;
  const panel = document.getElementById(`detail-${wi}`);
  const tc = typeConfig[post.type];

  if (activeId === id) {
    activeId = null;
    panel.classList.remove('show');
    panel.innerHTML = '';
    document.getElementById(`post-${id}`).classList.remove('active');
    return;
  }

  if (activeId) {
    const [oldWi, oldPi] = activeId.split('-');
    document.getElementById(`post-${activeId}`)?.classList.remove('active');
    if (oldWi !== String(wi)) {
      document.getElementById(`detail-${oldWi}`)?.classList.remove('show');
    }
  }

  activeId = id;
  document.getElementById(`post-${id}`).classList.add('active');

  const tagsHtml = post.hashtags.map(t => `<span class="tag">${t}</span>`).join('');

  panel.innerHTML = `
    <button class="detail-close" onclick="closeDetail(${wi},'${id}')">close ×</button>
    <div class="detail-title"><span class="type-badge ${tc.cls}" style="margin-right:8px"><i class="ti ${tc.icon}" aria-hidden="true" style="font-size:11px"></i>${tc.label}</span>${post.title}</div>
    <div class="detail-hook">${post.hook}</div>
    <div class="detail-grid">
      <div class="detail-section">
        <div class="detail-label">Slide / content structure</div>
        <div class="detail-content">${post.slides}</div>
      </div>
      <div class="detail-section">
        <div class="detail-label">Production notes</div>
        <div class="detail-content">${post.notes}</div>
      </div>
    </div>
    <div style="margin-top:1rem">
      <div class="detail-label">Caption draft</div>
      <div class="caption-preview" style="margin-top:6px">${post.caption}</div>
    </div>
    <div style="margin-top:1rem">
      <div class="detail-label">Suggested hashtags</div>
      <div class="tags">${tagsHtml}</div>
    </div>
  `;
  panel.classList.add('show');
}

function closeDetail(wi, id) {
  activeId = null;
  document.getElementById(`post-${id}`)?.classList.remove('active');
  document.getElementById(`detail-${wi}`).classList.remove('show');
}

render();
</script>
